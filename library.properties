sentence=Board support for the Guition JC4880P443C_I_W (ESP32-P4) 4.3" touch display.
paragraph=Drives the ST7701S 480x800 MIPI-DSI panel via a manual bring-up recipe (no esp_lcd_st7701 vendor component) and the GT911 I2C capacitive touch controller. Provides a double-buffered framebuffer with region-flush plus a PPA hardware-rotate present path for tear-free LVGL output. Core is ESP-IDF esp_lcd/PPA, usable from both Arduino-ESP32 and ESP-IDF.
category=Display
