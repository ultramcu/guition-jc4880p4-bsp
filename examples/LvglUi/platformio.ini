; LvglUi — LVGL 8.3 example for the Guition JC4880P443 (ESP32-P4) BSP.
; OPTIONAL/secondary example (the DisplayTouchTest example is the primary,
; LVGL-free proof). Build:  pio run -d examples/LvglUi

[platformio]
boards_dir = ../../boards

[env:jc4880p4]
; pioarduino 55.03.36-1 = arduino-esp32 3.x / IDF 5.x for the ESP32-P4 ES chip.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36-1/platform-espressif32.zip
board = jc4880p4
framework = arduino


monitor_speed = 115200
upload_speed = 460800

board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv

; The BSP itself (this repo, two levels up) + LVGL 8.3.
lib_deps =
    symlink://../../
    lvgl@~8.3.0

build_flags =
    -DCORE_DEBUG_LEVEL=4
    -DBOARD_HAS_PSRAM
    -DBOARD_JC4880P4
    ; native USB CDC so Serial works over the USB-JTAG port
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; point LVGL at the lv_conf.h shipped next to this example
    -DLV_CONF_PATH="${PROJECT_DIR}/lv_conf.h"
    ; Kconfig value the vendored esp_lcd_touch (GT911) needs under the Arduino LDF
    -DCONFIG_ESP_LCD_TOUCH_MAX_POINTS=5
    ; version macros the esp_lcd_st7701 component's version header would supply
    -DESP_LCD_ST7701_VER_MAJOR=2
    -DESP_LCD_ST7701_VER_MINOR=0
    -DESP_LCD_ST7701_VER_PATCH=2
    ; panel/touch pins (override here if your schematic differs)
    -DBOARD_P4_LCD_RST=5
    -DBOARD_P4_LCD_BL=23
    -DBOARD_P4_TOUCH_SDA=7
    -DBOARD_P4_TOUCH_SCL=8
    -DBOARD_P4_TOUCH_RST=3
    -DBOARD_P4_TOUCH_INT=-1
    -DBOARD_P4_DSI_LDO_CHAN=3
    -DBOARD_P4_DSI_LDO_MV=2500
