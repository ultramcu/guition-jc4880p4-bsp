;
; DisplayTouchTest — standalone build proof for guition-jc4880p4-bsp.
; Builds for the Guition JC4880P443C_I_W (ESP32-P4, ENGINEERING-SAMPLE chip).
;
; WIRING GOTCHAS (see README):
;   * boards_dir = ../../boards   -> resolves the shipped jc4880p4.json
;                                    (chip_variant esp32p4_es — REQUIRED or the
;                                    2nd-stage bootloader hits "Illegal instruction").
;   * lib_extra_dirs = ../../..   -> makes the parent repo (which carries a root
;                                    library.json + src/board_p4.c) discoverable so
;                                    the BSP gets compiled into the example.
;   * Pin the platform to pioarduino 55.03.36-1: 55.03.35/37 bootloop the P4.
;   * Do NOT add esp_lcd_st7701 — the manual bring-up is the whole point
;     (the vendor driver gives a black screen on this panel).

[platformio]
; Resolve the shipped board definition (jc4880p4.json, chip_variant esp32p4_es).
boards_dir = ../../boards

[env:jc4880p4-example]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.36-1/platform-espressif32.zip
board = jc4880p4
framework = arduino

; Make the parent repo (root library.json + src/board_p4.c) discoverable.
lib_extra_dirs = ../../..

board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv

; The GT911 touch driver is Espressif's esp_lcd_touch_gt911 + esp_lcd_touch base
; (Apache-2.0). It lives in IDF's component registry, NOT the PlatformIO registry,
; so it is vendored verbatim under this example's lib/esp_lcd_touch_gt911/ and the
; LDF picks it up automatically (see that dir's SOURCE.md for origin/attribution).

build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_ESP_LCD_TOUCH_MAX_POINTS=5
    ; panel + touch pins (HW-verified; override here if a schematic differs)
    -DBOARD_P4_LCD_RST=5
    -DBOARD_P4_LCD_BL=23
    -DBOARD_P4_TOUCH_SDA=7
    -DBOARD_P4_TOUCH_SCL=8
    -DBOARD_P4_TOUCH_RST=3
    -DBOARD_P4_TOUCH_INT=-1
    ; DSI PHY internal LDO
    -DBOARD_P4_DSI_LDO_CHAN=3
    -DBOARD_P4_DSI_LDO_MV=2500
